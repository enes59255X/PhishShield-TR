<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhishShield TR</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L3 7V12C3 16.55 7.08 20.74 12 22C16.92 20.74 21 16.55 21 12V7L12 2Z" fill="currentColor" opacity="0.15" stroke="currentColor" stroke-width="1.5"/>
            <path d="M9 12L11 14L15 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-main">PhishShield</span>
          <span class="logo-badge">TR</span>
        </div>
      </div>
      <button class="btn-reanalyze" id="btnReanalyze" title="Yeniden Analiz Et">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 4v6h-6"/>
          <path d="M1 20v-6h6"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
    </header>

    <!-- URL Bar -->
    <div class="url-bar" id="urlBar">
      <svg class="url-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0 7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0-7.07 7.07l1.71-1.71"/>
      </svg>
      <span id="currentUrl" class="url-text">Yükleniyor...</span>
    </div>

    <!-- Main Content -->
    <main class="main" id="mainContent">

      <!-- Loading State -->
      <div class="state-loading" id="stateLoading">
        <div class="loader-ring">
          <div class="ring-segment"></div>
        </div>
        <div class="loading-text" id="loadingText">PhishShield TR analiz yapılıyor...</div>
      </div>

      <!-- Error State -->
      <div class="state-error" id="stateError">
        <div class="error-icon">⚠️</div>
        <div class="error-title">PhishShield TR Hatası</div>
        <div class="error-message" id="errorMsg">Backend servisi kapalı</div>
        <button class="btn-retry" id="btnRetry">Tekrar Dene</button>
      </div>

      <!-- Result State -->
      <div class="state-result" id="stateResult">
        <div class="score-section">
          <div class="score-ring">
            <svg class="score-svg" viewBox="0 0 100 100">
              <circle class="score-track" cx="50" cy="50" r="45"/>
              <circle class="score-fill" id="scoreFill" cx="50" cy="50" r="45" stroke-dasharray="283" stroke-dashoffset="283"/>
            </svg>
            <div class="score-inner">
              <div class="score-number" id="scoreNumber">0</div>
              <div class="score-label">RİSK</div>
            </div>
          </div>
          <div class="score-meta">
            <div class="risk-badge" id="riskBadge">Bekleniyor...</div>
            <div class="threat-type" id="threatType">Analiz ediliyor...</div>
          </div>
        </div>

        <!-- Sub Scores -->
        <div class="sub-scores" id="subScores">
          <div class="sub-score-title">Detaylı Analiz Sonuçları</div>
          <div class="sub-score-grid" id="subScoreGrid"></div>
        </div>

        <!-- Analiz Detayları Listesi -->
        <div class="section findings-section" id="findingsSection">
          <div class="section-header">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 16v-4M12 8h.01"/>
            </svg>
            <span>Tespit Edilen Bulgular</span>
          </div>
          <ul class="findings-list" id="findingsList"></ul>
        </div>

        <!-- Güvenlik Önerileri -->
        <div class="section recs-section" id="recsSection">
          <div class="section-header">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
              <path d="M12 8v4M12 16h.01"/>
            </svg>
            <span>Güvenlik Önerileri</span>
          </div>
          <ul class="recs-list" id="recsList"></ul>
        </div>

      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <span>TrapSense &copy; 2026</span>
      <span class="footer-sep">·</span>
      <span>PhishShield TR v2.0</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
